floor_plans:
  - title:
      text: "Doors and windows"
      font_size: 18
    #layout:
    #  bottom_left_corner: [0,0]
    #  top_right_corner: [12, 12]
    #  scale_numerator: 1
    #  scale_denominator: 40
    #  grid_major_step: 1
    #  grid_minor_step: 0.1
