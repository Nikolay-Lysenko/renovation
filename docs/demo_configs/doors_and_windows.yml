project:
  dpi: 200
  pdf_file: null
  png_dir: "../images"
default_options:
  Door:
    label_color: green
    # id_color: red
    dimensions: true  # Draw door dimensions
  Window:
    label_color: green
    # id_color: green
  Wall:  # Options for both Wall and WallND
    label_color: lightblue
    # id_color: red
    dimensions: false
    show_invisible: false
constants:
  anchor_window_x: 11
  anchor_door_hinge_0_x: 4
  anchor_rdoor_hinge_0_x: 6
  anchor_door_hinge_1_x: 8
  anchor_rdoor_hinge_1_x: 10

default_layout:
  bottom_left_corner: [-1, -1]
  top_right_corner: [12, 8]
  scale_numerator: 1
  scale_denominator: 40
  grid_major_step: 1
  grid_minor_step: 0.1
reusable_elements:
  right_doors_tk2:
    - type: wall
      anchor_point: [-0.5, 0]
      length: 0.5
      thickness: 0.1
      color: black
      orientation_angle: 0
    - type: door
      anchor_point: [0, 0]
      doorway_width: 1
      door_width: 0.8
      thickness: 0.1
      to_the_right: true
      orientation_angle: 0
      color: gray
      label: "right_0"
    - type: wall
      anchor_point: [0, 1.5]
      length: 0.5
      thickness: 0.2
      color: black
      orientation_angle: 90
    - type: door
      anchor_point: [0, 2]
      doorway_width: 1
      door_width: 0.8
      thickness: 0.2
      to_the_right: true
      orientation_angle: 90
      color: gray
      label: "right_90"
    - type: door
      anchor_point: [0, 4]
      doorway_width: 1
      door_width: 0.8
      thickness: 0.2
      to_the_right: true
      orientation_angle: 180
      color: gray
      label: "right_180"
    - type: door
      anchor_point: [0, 6]
      doorway_width: 1
      door_width: 0.8
      thickness: 0.2
      to_the_right: true
      orientation_angle: 270
      color: gray
      label: "right_270"
  left_doors_tk2:
    - type: wall
      anchor_point: [1.5, 0]
      length: 0.5
      thickness: 0.2
      color: green
      orientation_angle: 0
    - type: door
      anchor_point: [2, 0]
      doorway_width: 1
      door_width: 0.8
      thickness: 0.2
      to_the_right: false
      orientation_angle: 0
      color: gray
      label: "left_0"
    - type: wall
      anchor_point: [2, 1.5]
      length: 0.5
      thickness: 0.2
      color: black
      orientation_angle: 90
    - type: door
      anchor_point: [2, 2]
      doorway_width: 1
      door_width: 0.8
      thickness: 0.2
      to_the_right: false
      orientation_angle: 90
      color: gray
      label: "left_90"
    - type: door
      anchor_point: [2, 4.5]
      doorway_width: 1
      door_width: 0.8
      thickness: 0.2
      to_the_right: false
      orientation_angle: 180
      color: gray
