      thickness: 0.2
      to_the_right: false
      orientation_angle: 180
      color: blue
      label: "left_180_hinge1"
      hinges_point: 1
    - type: door
      anchor_point: [anchor_door_hinge_1_x, 6]
      doorway_width: 1
      door_width: 0.8
      thickness: 0.2
      to_the_right: false
      orientation_angle: 270
      color: blue
      label: "left_270_hinge1"
