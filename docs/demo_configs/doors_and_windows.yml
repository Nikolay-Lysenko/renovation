  windows:
    # Window
    - type: window
      anchor_point: [anchor_window_x, 0]
      length: 0.8
      overall_thickness: 0.4
      single_line_thickness: 0.05
      label: "win_0"
    - type: window
      anchor_point: [anchor_window_x, 2]
      length: 0.8
      overall_thickness: 0.4
