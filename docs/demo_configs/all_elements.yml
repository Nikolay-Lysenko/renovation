project:
  dpi: 200
  pdf_file: null
  png_dir: "docs/images"
default_layout:
  bottom_left_corner: [0, 0.4]
  top_right_corner: [4, 9]
  scale_numerator: 1
  scale_denominator: 40
  grid_major_step: null
  grid_minor_step: null
reusable_elements:
  walls_windows_doors:
    # Wall
    - type: wall
      pivot_point: [2.2, 8.8]
      length: 1.6
      thickness: 0.2
    - type: text_box
      pivot_point: [1.0, 8.9]
      lines:
        - "Wall:"
      transparency: 0.0
    # Window
    - type: wall
      pivot_point: [2.2, 8.3]
      length: 0.3
      thickness: 0.2
      color: gray
    - type: wall
      pivot_point: [3.5, 8.3]
      length: 0.3
      thickness: 0.2
      color: gray
    - type: window
      pivot_point: [2.5, 8.3]
      length: 1.0
      overall_thickness: 0.2
      single_line_thickness: 0.025
    - type: text_box
      pivot_point: [1.0, 8.4]
      lines:
        - "Window:"
      transparency: 0.0
    # Door
    - type: wall
      pivot_point: [2.2, 7.0]
      length: 0.3
      thickness: 0.2
      color: gray
    - type: wall
      pivot_point: [3.5, 7.0]
      length: 0.3
      thickness: 0.2
      color: gray
    - type: door
      pivot_point: [2.5, 7.2]
      doorway_width: 1.0
      door_width: 0.9
      thickness: 0.05
    - type: text_box
      pivot_point: [1.0, 7.5]
      lines:
        - "Door:"
      transparency: 0.0
    # Polygon
    - type: wall
      pivot_point: [2.94641, 6.0]
      length: 0.65339
      thickness: 0.2
      color: gray
    - type: wall
      pivot_point: [2.94641, 6.2]
      length: 0.65339
      thickness: 0.2
      orientation_angle: 30
      color: gray
    - type: polygon
      vertices:
        - [2.2, 6.0]
        - [2.84641, 6.3732051]
        - [2.94641, 6.2]
        - [2.94641, 6.0]
    - type: text_box
      pivot_point: [1.0, 6.3]
      lines:
        - "Polygon:"
      transparency: 0.0
    # Dimension arrow
    - type: dimension_arrow
      pivot_point: [2.2, 5.55]
      length: 1.6
    - type: text_box
      pivot_point: [1.0, 5.5]
      lines:
        - "Dimension arrow:"
      transparency: 0.0
    # Lines
    - type: line
      pivot_point: [2.2, 5.05]
      another_pivot_point: [3.8, 5.05]
      width: 1.0
    - type: line
      pivot_point: [2.2, 4.85]
      another_pivot_point: [3.8, 4.85]
      width: 1.0
      style: dashed
    - type: line
      pivot_point: [2.2, 4.65]
      another_pivot_point: [3.8, 4.65]
      width: 1.0
      style: dash_dot
    - type: line
      pivot_point: [2.2, 4.45]
      another_pivot_point: [3.8, 4.45]
      width: 1.0
      style: dotted
    - type: text_box
      pivot_point: [1.0, 4.75]
      lines:
        - "Lines:"
      transparency: 0.0
    # Text box
    - type: text_box
      pivot_point: [3.0, 3.9]
      lines:
        - "Text box."
        - "It can be multiline."
    - type: text_box
      pivot_point: [1.0, 3.9]
      lines:
        - "Text box:"
      transparency: 0.0
    # Power outlets
    - type: power_outlet
      pivot_point: [2.5, 3.05]
      length: 0.2
    - type: power_outlet
      pivot_point: [2.9, 3.05]
      length: 0.2
      waterproof: true
    - type: power_outlet
      pivot_point: [3.3, 3.05]
      length: 0.2
      high_voltage: true
    - type: power_outlet
      pivot_point: [3.7, 3.05]
      length: 0.2
      low_current: true
    - type: text_box
      pivot_point: [1.0, 3.1]
      lines:
        - "Power outlets"
        - "(regular, waterproof,"
        - "high-voltage, low-current):"
      transparency: 0.0
    # Electrical cable
    - type: electrical_cable
      pivot_point: [3.0, 2.4]
      symbol_length: 0.2
    - type: text_box
      pivot_point: [1.0, 2.5]
      lines:
        - "Electrical cable:"
      transparency: 0.0
    # Ceiling lamp
    - type: ceiling_lamp
      pivot_point: [3.0, 2.05]
      symbol_diameter: 0.3
      line_width: 0.75
    - type: text_box
      pivot_point: [1.0, 2.05]
      lines:
        - "Ceiling lamp:"
      transparency: 0.0
    # Wall lamp
    - type: wall_lamp
      pivot_point: [3.0, 1.5]
      symbol_diameter: 0.2
    - type: text_box
      pivot_point: [1.0, 1.6]
      lines:
        - "Wall lamp:"
      transparency: 0.0
    # LED strip
    - type: led_strip
      pivot_point: [2.3, 1.1]
      length: 1.4
      width: 0.1
    - type: text_box
      pivot_point: [1.0, 1.15]
      lines:
        - "LED strip:"
      transparency: 0.0
    # Switches
    - type: switch
      pivot_point: [2.5, 0.4]
      symbol_length: 0.2
    - type: switch
      pivot_point: [2.9, 0.4]
      symbol_length: 0.2
      two_key: true
    - type: switch
      pivot_point: [3.3, 0.4]
      symbol_length: 0.2
      pass_through: true
    - type: switch
      pivot_point: [3.7, 0.4]
      symbol_length: 0.2
      two_key: true
      pass_through: true
    - type: text_box
      pivot_point: [1.0, 0.4]
      lines:
        - "Switches"
        - "(one-key, two-key,"
        - "one-key pass-through,"
        - "two-key pass-through):"
      transparency: 0.0
floor_plans:
  - title:
      text: "Individual elements"
      font_size: 18
    inherited_elements:
      - walls_windows_doors
