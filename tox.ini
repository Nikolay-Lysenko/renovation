[tox]
requires =
    tox>=4
env_list = lint, py{310,311,312}

[testenv]
description = run unit tests
deps =
    pytest>=7
    pytest-cov
commands =
    pytest --cov=renovation {posargs}

[testenv:lint]
description = run linters
skip_install = true
deps =
    flake8
    flake8-docstrings
commands = flake8 renovation tests

[coverage:run]
branch = True
source = renovation

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if .debug:
    raise AssertionError
    raise NotImplementedError
    raise RuntimeError
    raise AttributeError
    raise ValueError
    raise TypeError
    if __name__ == .__main__.:
    pass

[flake8]
ignore =
    W503
exclude =
    .git
    .eggs
    venv
max-line-length = 99
max-complexity = 8
